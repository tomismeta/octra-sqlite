name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      EXPECTED_WASM_SHA256: 81f68d01f4d28515f0031a9a3e52093e4e5cab926ea01df4f7f32a1b9b1d15f9
      EXPECTED_WASM_BYTES: "607439"
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install WASM audit tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wabt
      - name: Rust tests
        run: cargo test --locked
      - name: Script syntax
        run: find scripts -name '*.sh' -exec bash -n {} \;
      - name: Check bundled WASM artifact
        run: |
          test -f circle/wasm/octra_sqlite_circle.wasm
          test "$(wc -c < circle/wasm/octra_sqlite_circle.wasm | tr -d ' ')" = "$EXPECTED_WASM_BYTES"
          test "$(sha256sum circle/wasm/octra_sqlite_circle.wasm | awk '{print $1}')" = "$EXPECTED_WASM_SHA256"
          bash scripts/audit-wasm.sh circle/wasm/octra_sqlite_circle.wasm
      - name: WASM behavior harness
        run: OCTRA_SQLITE_WASM=circle/wasm/octra_sqlite_circle.wasm cargo test --locked --features wasm-behavior --test wasm_host_harness
